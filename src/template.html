<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Browser-based Morse code practice tool from the Long Island CW Club. Adjustable speed, Farnsworth timing, LICW lessons, and text-to-speech support.">
    <meta id="theme-color-meta" name="theme-color" content="#ffffff">
    <title>LICW Morse Practice Page</title>
    <script>
        (function() {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.setAttribute('data-bs-theme', 'dark');
                document.getElementById('theme-color-meta').content = '#212529';
            }
        })();
    </script>
</head>

<body>
    <div id="app-loading" role="status" aria-label="Loading">
        <div class="spinner-border text-primary">
            <span class="visually-hidden">Loading…</span>
        </div>
    </div>

    <div id="react-root"></div>
</body>

</html>
